version: "3.9"

services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: jobs_ai
      POSTGRES_USER: jobs_ai
      POSTGRES_PASSWORD: jobs_ai_pass
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U jobs_ai"]
      interval: 5s
      timeout: 5s
      retries: 10
    ports:
      - "5432:5432"

  redis:
    image: redis:7-alpine
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10
    ports:
      - "6379:6379"

  backend:
    build:
      context: ./backend
    env_file: .env
    environment:
      DATABASE_URL: postgresql+asyncpg://jobs_ai:jobs_ai_pass@db:5432/jobs_ai
      REDIS_URL: redis://redis:6379/0
    volumes:
      - pdfdata:/data/pdfs
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    ports:
      - "8000:8000"
    command: >
      sh -c "alembic upgrade head && uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload"

  worker:
    build:
      context: ./backend
    env_file: .env
    environment:
      DATABASE_URL: postgresql+asyncpg://jobs_ai:jobs_ai_pass@db:5432/jobs_ai
      REDIS_URL: redis://redis:6379/0
    volumes:
      - pdfdata:/data/pdfs
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: celery -A app.workers.tasks.celery_app worker --loglevel=info --concurrency=2

  beat:
    build:
      context: ./backend
    env_file: .env
    environment:
      DATABASE_URL: postgresql+asyncpg://jobs_ai:jobs_ai_pass@db:5432/jobs_ai
      REDIS_URL: redis://redis:6379/0
    depends_on:
      - redis
    command: celery -A app.workers.tasks.celery_app beat --loglevel=info

  frontend:
    build:
      context: ./frontend
    ports:
      - "5173:80"
    depends_on:
      - backend

volumes:
  pgdata:
  pdfdata:
